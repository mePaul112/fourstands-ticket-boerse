<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FourStands – Ticket-Börse | FC St. Pauli</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f0d0a">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FourStands">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ─── FCSP COLOUR TOKENS ─────────────────────────────── */
:root {
  --bg:       #0f0d0a;   /* warm near-black                */
  --sf:       #181410;   /* card / surface                 */
  --sf2:      #211b14;   /* input / deep surface           */
  --bd:       #2e2318;   /* warm border                    */
  --red:      #EC1B24;   /* FCSP primary red               */
  --red-d:    #c0141b;   /* red dark                       */
  --brn:      #6B3A2A;   /* FCSP Braun                     */
  --brn-l:    #8B5040;   /* Braun light                    */
  --sk:       #F5F0E8;   /* skull / warm white             */
  --tx:       #EDE8DE;   /* body text                      */
  --mu:       #7A6E64;   /* muted text                     */
  --su:       #3B82F6;   /* Suche  – blue                  */
  --bi:       #22C55E;   /* Biete  – green                 */
  --ta:       #F97316;   /* Tausch – orange                */
  --ma:       #FBBF24;   /* match  – gold                  */
  /* FOUR STANDS rainbow */
  --r1:#E63946; --r2:#F4A261; --r3:#F7DC6F;
  --r4:#2ECC71; --r5:#3498DB; --r6:#9B59B6;
}

/* ─── LIGHT THEME (Toggle) ───────────────────────────── */
body.light {
  --bg:#f4f1ea; --sf:#ffffff; --sf2:#f3eee5; --bd:#ddd2c2;
  --tx:#211a13; --mu:#6f6357;
}
body.light .topbar  { background:#ece5da; border-bottom-color:#ddd2c2; }
body.light .nav-wrap { background:#ffffff; border-bottom-color:#ddd2c2; }
body.light .card:hover { background:#f6f2ea; }
body.light .tag-su, body.light .form-heading.su, body.light .meta-sig, body.light .stat-n.s, body.light .nb.su.active { color:#1d4ed8; }
body.light .tag-bi, body.light .form-heading.bi, body.light .stat-n.b, body.light .nb.bi.active { color:#15803d; }
body.light .tag-ta, body.light .form-heading.ta, body.light .stat-n.t, body.light .nb.ta.active { color:#c2410c; }
body.light .tag-match, body.light .match-banner { color:#b45309; }

/* ─── RESET & BASE ───────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--tx);
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
}
a { color: inherit; text-decoration: none; }

/* ─── UTILITY ────────────────────────────────────────── */
.up   { text-transform: uppercase; }
.cond { font-family: 'Barlow Condensed', sans-serif; }
.bbn  { font-family: 'Bebas Neue', sans-serif; }
.muted { color: var(--mu); }

/* ─── FCSP-STYLE TOP BAR ─────────────────────────────── */
.topbar {
  background: #070503;
  border-bottom: 1px solid #1a1208;
  padding: 4px 20px;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 16px;
}
.topbar-item {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--mu);
  display: flex;
  align-items: center;
  gap: 6px;
}
.conn-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.conn-dot.live   { background: var(--bi); box-shadow: 0 0 5px var(--bi); animation: blink 2s infinite; }
.conn-dot.local  { background: var(--ma); }
.conn-dot.off    { background: #ff5252; }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:.3;} }

/* ─── HEADER ─────────────────────────────────────────── */
.hdr {
  background: #070503;
  border-bottom: 3px solid var(--red);
  padding: 16px 20px 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.hdr-inner {
  display: flex;
  align-items: center;
  gap: 16px;
  max-width: 980px;
  margin: 0 auto;
}
.skull-svg { flex-shrink: 0; }
.logo-block { flex: 1; }
.logo-four, .logo-stands {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 4px;
  line-height: .95;
  font-size: 28px;
}
.logo-four span, .logo-stands span { display: inline-block; }
.logo-eyebrow {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--mu);
  margin-top: 4px;
}
.hdr-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}
.admin-btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  padding: 4px 12px;
  border-radius: 0;
  border: 1px solid var(--brn);
  background: transparent;
  color: var(--mu);
  cursor: pointer;
  transition: all .15s;
}
.admin-btn:hover { border-color: var(--red); color: var(--tx); }
.admin-btn.on {
  background: var(--bi);
  border-color: var(--bi);
  color: #000;
}

/* ─── NAVIGATION ─────────────────────────────────────── */
.nav-wrap {
  background: #0c0a07;
  border-bottom: 1px solid var(--bd);
  position: sticky;
  top: 71px;  /* below sticky header */
  z-index: 99;
}
.nav {
  display: flex;
  overflow-x: auto;
  max-width: 980px;
  margin: 0 auto;
  scrollbar-width: none;
}
.nav::-webkit-scrollbar { display: none; }
.nb {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--mu);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  padding: 12px 18px;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: all .15s;
}
.nb:hover { color: var(--tx); }
.nb.active { color: var(--tx); border-bottom-color: var(--red); }
.nb.su.active { border-bottom-color: var(--su); color: #93c5fd; }
.nb.bi.active { border-bottom-color: var(--bi); color: #86efac; }
.nb.ta.active { border-bottom-color: var(--ta); color: #fdba74; }
.nbadge {
  display: inline-block;
  background: var(--bd);
  color: var(--mu);
  font-family: 'Barlow', sans-serif;
  font-weight: 700;
  font-size: 10px;
  border-radius: 2px;
  padding: 0 5px;
  margin-left: 5px;
  line-height: 16px;
}
.nav-lock { font-size: 9px; margin-left: 3px; opacity: .4; }

/* ─── MAIN CONTENT AREA ──────────────────────────────── */
.main { padding: 16px; max-width: 980px; margin: 0 auto; }

/* ─── SPIEL SELECTOR ─────────────────────────────────── */
.spiel-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  padding: 10px 14px;
  background: var(--sf);
  border: 1px solid var(--bd);
  border-left: 3px solid var(--red);
}
.spiel-lbl {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  color: var(--mu);
  flex-shrink: 0;
}
.spiel-sel {
  flex: 1;
  min-width: 160px;
  background: var(--sf2);
  border: 1px solid var(--bd);
  color: var(--tx);
  padding: 6px 10px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

/* ─── STATS ROW ──────────────────────────────────────── */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--bd);
  border: 1px solid var(--bd);
  margin-bottom: 16px;
}
.stat {
  background: var(--sf);
  padding: 10px 14px;
  text-align: center;
}
.stat-n {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  line-height: 1;
}
.stat-n.s { color: var(--su); }
.stat-n.b { color: var(--bi); }
.stat-n.t { color: var(--ta); }
.stat-l {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--mu);
  margin-top: 2px;
}

/* ─── MATCH BANNER ───────────────────────────────────── */
.match-banner {
  background: var(--sf);
  border-left: 3px solid var(--ma);
  padding: 8px 14px;
  margin-bottom: 8px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: .5px;
  color: var(--ma);
}

/* ─── CARD GRID ──────────────────────────────────────── */
.card-grid { display: flex; flex-direction: column; gap: 1px; background: var(--bd); border: 1px solid var(--bd); }
.card {
  background: var(--sf);
  padding: 12px 14px;
  display: grid;
  grid-template-columns: 36px 1fr auto;
  gap: 12px;
  align-items: start;
  transition: background .12s;
}
.card:hover { background: #1d1710; }
.card.is-match { border-left: 3px solid var(--ma); }
.card.done { opacity: .35; }
.card-nr {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  color: var(--bd);
  text-align: center;
  line-height: 1;
  padding-top: 2px;
  border-right: 1px solid var(--bd);
  padding-right: 8px;
}

/* ─── TYPE TAGS (FCSP category style) ───────────────── */
.tag {
  display: inline-block;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  padding: 2px 8px;
  margin-bottom: 5px;
  border-left: 2px solid;
}
.tag-su { color: #93c5fd; border-color: var(--su); background: #3b82f610; }
.tag-bi { color: #86efac; border-color: var(--bi); background: #22c55e10; }
.tag-ta { color: #fdba74; border-color: var(--ta); background: #f9731610; }
.tag-match { color: var(--ma); border-color: var(--ma); background: #fbbf2410; margin-left: 6px; }

.card-heading {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 18px;
  text-transform: uppercase;
  letter-spacing: .5px;
  line-height: 1.1;
  margin-bottom: 4px;
}
.card-tgg {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 12px;
  color: var(--mu);
  margin-bottom: 3px;
}
.card-tgg span { color: var(--ta); font-weight: 700; }
.card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 14px;
  align-items: center;
}
.meta-name { font-weight: 600; font-size: 13px; }
.meta-sig {
  font-size: 12px;
  color: #60a5fa;
  text-decoration: none;
  font-family: 'Barlow Condensed', sans-serif;
  letter-spacing: .5px;
}
.meta-sig:hover { text-decoration: underline; }
.meta-time {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  color: var(--mu);
  letter-spacing: .5px;
}
.meta-anz { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; color: var(--mu); }
.card-note { font-size: 12px; color: var(--mu); margin-top: 4px; font-style: italic; }
.card-acts { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
.btn-done {
  background: none;
  border: 1px solid #22c55e40;
  color: #86efac;
  padding: 3px 10px;
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: all .15s;
  white-space: nowrap;
}
.btn-done:hover { background: #22c55e15; }
.btn-del {
  background: none;
  border: none;
  color: var(--mu);
  cursor: pointer;
  font-size: 16px;
  line-height: 1;
  padding: 2px 4px;
  transition: color .15s;
}
.btn-del:hover { color: var(--red); }

/* ─── EMPTY STATE ────────────────────────────────────── */
.empty {
  text-align: center;
  padding: 48px 16px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--mu);
  border: 1px solid var(--bd);
}
.empty-ico { font-size: 30px; display: block; margin-bottom: 10px; }

/* ─── FORMS ──────────────────────────────────────────── */
.form-panel {
  background: var(--sf);
  border: 1px solid var(--bd);
  border-top: 2px solid var(--red);
  padding: 16px;
  margin-bottom: 12px;
}
.form-panel.su { border-top-color: var(--su); }
.form-panel.bi { border-top-color: var(--bi); }
.form-panel.ta { border-top-color: var(--ta); }
.form-panel.sp { border-top-color: var(--red); }
.form-heading {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 14px;
}
.form-heading.su { color: #93c5fd; }
.form-heading.bi { color: #86efac; }
.form-heading.ta { color: #fdba74; }
.form-heading.sp { color: var(--tx); }
.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 10px;
  margin-bottom: 12px;
}
.fg { display: flex; flex-direction: column; gap: 4px; }
.fg label {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--mu);
}
.fg input, .fg select {
  background: var(--sf2);
  border: 1px solid var(--bd);
  border-bottom: 1px solid #4a3828;
  color: var(--tx);
  padding: 8px 10px;
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  transition: border-color .15s;
}
.fg input:focus, .fg select:focus {
  outline: none;
  border-bottom-color: var(--red);
}
.fg input::placeholder { color: var(--mu); }

/* ─── BUTTONS ────────────────────────────────────────── */
.btn-primary {
  background: var(--red);
  color: #fff;
  border: none;
  padding: 9px 20px;
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 2px;
  transition: all .15s;
}
.btn-primary:hover { background: var(--red-d); }
.btn-primary.su { background: var(--su); }
.btn-primary.su:hover { background: #2563eb; }
.btn-primary.ta { background: var(--ta); }
.btn-primary.ta:hover { background: #ea6c10; }
.btn-secondary {
  background: transparent;
  color: var(--mu);
  border: 1px solid var(--bd);
  padding: 6px 14px;
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  transition: all .15s;
}
.btn-secondary:hover { border-color: var(--tx); color: var(--tx); }

/* ─── TOGGLE BUTTON ──────────────────────────────────── */
.toggler {
  width: 100%;
  background: transparent;
  border: 1px solid var(--bd);
  color: var(--mu);
  padding: 10px 16px;
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
  text-align: left;
  transition: all .15s;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.toggler::before { content: '+'; font-size: 18px; color: var(--red); font-weight: 300; }
.toggler.open::before { content: '−'; }
.toggler:hover { border-color: var(--red); color: var(--tx); }

/* ─── DIVIDER ────────────────────────────────────────── */
.section-divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 14px 0;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--mu);
}
.section-divider::before, .section-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--bd);
}

/* ─── MODALS ─────────────────────────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal {
  background: var(--sf);
  border: 1px solid var(--bd);
  border-top: 3px solid var(--red);
  padding: 24px;
  max-width: 460px;
  width: 100%;
}
.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 2px;
  color: var(--tx);
  margin-bottom: 10px;
}
.modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

/* ─── PIN PAD ────────────────────────────────────────── */
.pin-display {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin: 20px 0 24px;
}
.pd {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--bd);
  transition: background .12s;
}
.pd.fill { background: var(--red); }
.pd.err  { background: #ff5252; }
.pin-pad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  max-width: 240px;
  margin: 0 auto;
}
.pk {
  background: var(--sf2);
  border: 1px solid var(--bd);
  color: var(--tx);
  padding: 15px 0;
  cursor: pointer;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  text-align: center;
  transition: all .12s;
  -webkit-tap-highlight-color: transparent;
}
.pk:hover { background: var(--bd); border-color: var(--red); }
.pk:active { transform: scale(.93); }
.pk.clr { color: var(--ta); font-family: 'Barlow', sans-serif; font-size: 18px; }
.pk.cnl { color: var(--mu); font-family: 'Barlow', sans-serif; font-size: 16px; }
.pin-hint {
  text-align: center;
  margin-top: 16px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 11px;
  color: var(--mu);
  letter-spacing: .5px;
  line-height: 1.6;
}

/* ─── SETUP TAB ──────────────────────────────────────── */
.setup-section { margin-bottom: 24px; }
.setup-section-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 800;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--mu);
  padding-bottom: 8px;
  border-bottom: 1px solid var(--bd);
  margin-bottom: 12px;
}
.setup-block {
  background: var(--sf);
  border: 1px solid var(--bd);
  padding: 14px;
  margin-bottom: 8px;
}
.step-nr {
  display: inline-block;
  background: var(--red);
  color: #fff;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  padding: 1px 10px;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.setup-block p { font-size: 12px; color: var(--mu); line-height: 1.7; margin-bottom: 8px; }
.setup-block a { color: var(--red); }
.setup-block a:hover { text-decoration: underline; }
pre {
  background: #070503;
  border: 1px solid var(--bd);
  padding: 14px;
  font-size: 11px;
  color: #b0a090;
  overflow-x: auto;
  line-height: 1.6;
  font-family: 'Courier New', monospace;
  white-space: pre;
  margin-bottom: 8px;
}
.btn-copy {
  background: transparent;
  border: 1px solid var(--bd);
  color: var(--mu);
  padding: 4px 12px;
  cursor: pointer;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  transition: all .15s;
}
.btn-copy:hover { border-color: var(--red); color: var(--tx); }
.conn-status {
  padding: 10px 14px;
  margin-bottom: 16px;
  font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  border-left: 3px solid;
}
.conn-status.ok  { background: #22c55e0d; border-color: var(--bi); color: #86efac; }
.conn-status.lc  { background: #fbbf240d; border-color: var(--ma); color: var(--ma); }
.conn-status.er  { background: #ff52520d; border-color: #ff5252;   color: #ff5252; }
.info-box {
  background: var(--sf);
  border: 1px solid var(--bd);

// ── I18N (DE/EN) ──────────────────────────────────────────────
const I18N={
 de:{ nav_ov:'Übersicht',nav_su:'Suche',nav_bi:'Biete',nav_ta:'Tausch',nav_sp:'Spiele',nav_se:'Setup',

 en:{ nav_ov:'Overview',nav_su:'Search',nav_bi:'Offer',nav_ta:'Swap',nav_sp:'Matches',nav_se:'Setup',

  mb_match:'MATCH',mb_seeks:'seeks',mb_offers:'offers',mb_swap:'SWAP MATCH',
  f_open:'Hide form',f_su_add:'Add: I am looking for a ticket',f_bi_add:'Add: I have a ticket to give',f_ta_add:'Add: I want to swap',
  fh_su:'🔍 Search ticket',fh_bi:'🎟️ Offer ticket',fh_ta:'🔄 Swap offer',
  l_name:'Name *',l_signal:'Signal contact',l_area:'Area *',l_qty:'Quantity',l_note:'Note',l_have:'I have *',l_want:'I want *',
  ph_name:'John Doe',ph_signal:'+49 123 … or @handle',ph_no_su:'e.g. wheelchair space, with child…',ph_no_bi:'e.g. price, meeting point…',ph_no_ta:'e.g. row, sector…',
  btn_su:'🔍 Join the queue',btn_bi:'🎟️ Add ticket',btn_ta:'🔄 Add swap',
  dm_title:'Delete entry?',dm_body:'This entry will be permanently deleted — visible to all members.',dm_cancel:'Cancel',dm_delete:'Delete',
  time_now:'just now',time_min:'% min ago',time_hr:'% h ago',
  t_added:'✓ Added',t_name:'Please enter a name',t_nogame:'No match selected',t_done:'✓ Marked as done',t_deleted:'✓ Deleted',t_linkcopied:'✓ Link copied',t_err:'Error: ' }
};
const t=k=>{ const v=(I18N[lang]&&I18N[lang][k]); return v!=null?v:(I18N.de[k]!=null?I18N.de[k]:k); };
const ldlang=()=>{ try{const l=localStorage.getItem(KL); if(l==='de'||l==='en')lang=l;}catch(e){} };
function applyLang(){
  document.documentElement.lang=lang;
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent=t(el.getAttribute('data-i18n')); });
  const lb=document.getElementById('langbtn'); if(lb)lb.textContent=lang==='de'?'EN':'DE';
}
function setLang(l){ lang=l; try{localStorage.setItem(KL,lang);}catch(e){} applyLang(); upconn(); upadm(); applyTheme(); ren(); go(cur); }
function toggleLang(){ setLang(lang==='de'?'en':'de'); }

// ── HELPERS ───────────────────────────────────────────────────
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function fmt(iso){
  if(!iso)return'';
  const d=new Date(iso),df=Math.floor((Date.now()-d)/60000);
  const loc=lang==='en'?'en-GB':'de-DE';
  if(df<1)return t('time_now');
  if(df<60)return t('time_min').replace('%',df);
  if(df<1440)return t('time_hr').replace('%',Math.floor(df/60));
  return d.toLocaleDateString(loc,{day:'2-digit',month:'2-digit'})+' '+
         d.toLocaleTimeString(loc,{hour:'2-digit',minute:'2-digit'});
}
const brei=sp=>sp ? (sp.typ==='heim'?HEIM:AUSW) : [...HEIM,...AUSW];
const anHM=s=>{ if(!s||!s.an||s.an.length<16) return ''; const t=s.an.slice(11,16); return t==='00:00'?'':t; };
const gsp=()=>st.sp.find(s=>s.id===st.aktiv)||null;
const gei=typ=>st.ei.filter(e=>e.sid===st.aktiv&&e.typ===typ&&e.s==='o')
             .sort((a,b)=>new Date(a.ts)-new Date(b.ts));

function mats(){
  const ms=[], su=gei('su'), bi=gei('bi'), ta=gei('ta');
  su.forEach(s=>bi.forEach(b=>{if(b.br===s.br)ms.push({t:'sb',s,b});}));
  ta.forEach((t1,i)=>ta.forEach((t2,j)=>{
    if(i<j&&t1.br===t2.tg&&t2.br===t1.tg)ms.push({t:'tt',t1,t2});
  }));
  return ms;
}
const mids=()=>mats().flatMap(m=>m.t==='sb'?[m.s.id,m.b.id]:[m.t1.id,m.t2.id]);
const bopt=(sp,sl='')=>brei(sp).map(b=>`<option value="${b}"${b===sl?' selected':''}>${b}</option>`).join('');

// ── DB MAPPING ────────────────────────────────────────────────
const mapsp=r=>({id:r.id,ge:r.gegner,da:r.datum,typ:r.typ,ts:r.created_at,ext:r.ext_id||null,an:r.anstoss||null});
// App-interne Kurz-Codes <-> DB-Langformen (DB-CHECK: typ IN suche/biete/tausch, status IN offen/erledigt)
const TYP2DB={su:'suche',bi:'biete',ta:'tausch'};
const DB2TYP={suche:'su',biete:'bi',tausch:'ta'};
const mapei=r=>({id:r.id,sid:r.spiel_id,typ:DB2TYP[r.typ]||r.typ,br:r.bereich,tg:r.tausch_gegen,nm:r.name,si:r.signal_kontakt,az:r.anzahl||1,no:r.notiz,s:(r.status==='erledigt'?'erledigt':'o'),ts:r.created_at});
const todb=e=>({spiel_id:e.sid,typ:TYP2DB[e.typ]||e.typ,bereich:e.br,tausch_gegen:e.tg||null,name:e.nm,signal_kontakt:e.si||null,anzahl:e.az||1,notiz:e.no||null,status:(e.s==='erledigt'?'erledigt':'offen')});

// ── SUPABASE ──────────────────────────────────────────────────
async function initSB(){
  if(!cfg.url||!cfg.key){cm='local';upconn();return;}
  // Strip common URL suffixes users accidentally paste
  const cleanUrl=cfg.url
    .replace(/\/rest\/v1\/?$/,'')
    .replace(/\/auth\/v1\/?$/,'')
    .replace(/\/+$/,'');
  try{
    sb=window.supabase.createClient(cleanUrl, cfg.key);
    // Test connection with a simple query
    const{error}=await sb.from('spiele').select('id').limit(1);
    if(error) throw new Error('DB-Fehler: '+error.message);
    await ldall(); subRT(); cm='live';
    lastConnErr='';
  }catch(e){
    console.warn('Supabase Fehler:',e);
    lastConnErr=e.message||String(e);
    ldbck(); cm='local'; sb=null;
  }
  upconn();
}
async function ldall(){
  sld(true);
  try{
    const{data,error}=await sb.from('spiele').select('*').order('datum',{ascending:true});
    if(error)throw error;
    st.sp=(data||[]).map(mapsp);
    if(!st.aktiv&&st.sp.length)st.aktiv=st.sp[0].id;
    if(st.aktiv)await ldei();
  }finally{sld(false);}
}
async function ldei(){
  if(!st.aktiv||!sb)return;
  const{data,error}=await sb.from('eintraege').select('*')
    .eq('spiel_id',st.aktiv).order('created_at',{ascending:true});
  if(error)throw error;
  st.ei=[...st.ei.filter(e=>e.sid!==st.aktiv),...(data||[]).map(mapei)];
}
function subRT(){
  if(ch)sb.removeChannel(ch);
  ch=sb.channel('fs5')
    .on('postgres_changes',{event:'*',schema:'public',table:'spiele'},async()=>{await ldall();ren();})
    .on('postgres_changes',{event:'*',schema:'public',table:'eintraege'},async()=>{await ldei();ren();})
    .subscribe();
}

// ── DB ACTIONS ────────────────────────────────────────────────
async function dbASP(g,d,t){
  if(sb){
    const{data,error}=await sb.from('spiele').insert({gegner:g,datum:d,typ:t}).select().single();
    if(error)throw error;
    const s=mapsp(data); st.sp.push(s); st.aktiv=s.id; await ldei(); return s;
  }
  const s={id:uid(),ge:g,da:d,typ:t,ts:new Date().toISOString()};
  st.sp.push(s); st.aktiv=s.id; svbck(); return s;
}
async function dbDSP(id){
  if(sb){const{error}=await sb.from('spiele').delete().eq('id',id);if(error)throw error;}
  st.sp=st.sp.filter(s=>s.id!==id);
  st.ei=st.ei.filter(e=>e.sid!==id);
  if(st.aktiv===id)st.aktiv=st.sp[0]?.id||null;
  if(!sb)svbck();
}
async function dbAE(e){
  if(sb){
    const{data,error}=await sb.from('eintraege').insert(todb(e)).select().single();
    if(error)throw error; st.ei.push(mapei(data));
  }else{ e.ts=new Date().toISOString(); st.ei.push(e); svbck(); }
}
async function dbDN(id){
  if(sb){const{error}=await sb.from('eintraege').update({status:'erledigt'}).eq('id',id);if(error)throw error;}
  const e=st.ei.find(e=>e.id===id); if(e)e.s='erledigt'; if(!sb)svbck();
}
async function dbDE(id){
  if(sb){const{error}=await sb.from('eintraege').delete().eq('id',id);if(error)throw error;}
  st.ei=st.ei.filter(e=>e.id!==id); if(!sb)svbck();
}

function cardH(e,nr,mi){
  const isM=mi.includes(e.id);
  const sig=e.si?`<a class="meta-sig" href="https://signal.me/#p/${encodeURIComponent(e.si)}" target="_blank">📱 ${e.si}</a>`:'';
  const az=e.az>1?`<span class="meta-anz">${e.az}${t('anz')}</span>`:'';
  const tg=e.typ==='ta'?`<div class="card-tgg">${t('card_tg')} <span>${e.tg||'—'}</span></div>`:'';
  const mB=isM?`<span class="tag tag-match">${t('tag_match')}</span>`:'';
  const lb=e.typ==='su'?t('lbl_su'):e.typ==='bi'?t('lbl_bi'):t('lbl_ta');
  const mine=(me.nm&&e.nm===me.nm)?`<span class="tag" style="color:var(--ma);border-color:var(--ma);background:#fbbf2410;margin-left:6px">${t('badge_mine')}</span>`:'';
  const doneBtn=e.s==='o'
    ?`<button class="btn-done" onclick="mkDn('${e.id}')">${t('done_btn')}</button>`
    :`<span style="font-family:'Barlow Condensed';font-size:10px;font-weight:800;letter-spacing:1.5px;color:#86efac;text-transform:uppercase">${t('done_lbl')}</span>`;
  return`<div class="card ${isM?'is-match':''} ${e.s==='erledigt'?'done':''}">
    <div class="card-nr">${nr}</div>
    <div>
      <div><span class="tag tag-${e.typ}">${lb}</span>${mB}${mine}</div>
      <div class="card-heading">${e.br}</div>
      ${tg}
      <div class="card-meta">
        <span class="meta-name">👤 ${e.nm}</span>
        ${sig}${az}
        <span class="meta-time">${fmt(e.ts)}</span>
      </div>
      ${e.no?`<div class="card-note">💬 ${e.no}</div>`:''}
    </div>
    <div class="card-acts">
      ${doneBtn}
      <button class="btn-del" onclick="sDel('${e.id}')">×</button>
    </div>
  </div>`;
}

function cgrp(typs){
  const mi=mids();
  let all=st.ei.filter(e=>e.sid===st.aktiv&&typs.includes(e.typ));
  if(!showDone) all=all.filter(e=>e.s==='o');
  if(onlyMine&&me.nm) all=all.filter(e=>e.nm===me.nm);
  all.sort((a,b)=>{ const sd=(a.s==='o'?0:1)-(b.s==='o'?0:1); return sd!==0?sd:new Date(a.ts)-new Date(b.ts); });
  if(!all.length)return`<div class="empty"><span class="empty-ico">📭</span>${onlyMine?t('empty_mine'):showDone?t('empty_all'):t('empty_open')}</div>`;
  const nr={su:0,bi:0,ta:0};
  return`<div class="card-grid">${all.map(e=>{ if(e.s==='o')nr[e.typ]++; return cardH(e,e.s==='o'?nr[e.typ]:'✓',mi);}).join('')}</div>`;
}

function go(tab){

  document.querySelectorAll('[id^="tab-"]').forEach(el=>el.style.display='none');
  document.querySelectorAll('.nb').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab).style.display='block';
  const tabs=['ov','su','bi','ta','sp','se'];
  const btn=document.querySelectorAll('.nb')[tabs.indexOf(tab)];
  if(btn)btn.classList.add('active');
  const showExtra=['ov','su','bi','ta'].includes(tab);
  document.getElementById('strow').style.display=showExtra?'grid':'none';
  document.getElementById('mbnr').style.display=showExtra?'block':'none';
  document.getElementById('spbar').style.display=['sp','se'].includes(tab)?'none':'flex';
}

function spChg(){
  st.aktiv=document.getElementById('spsel').value||null;
  if(sb&&st.aktiv)ldei().then(ren); else ren();
}
function tf(typ){ sf[typ]=!sf[typ]; ren(); go(typ); }

async function dASP(){
  const g=document.getElementById('sp-g').value.trim();
  const d=document.getElementById('sp-d').value;
  const t=document.getElementById('sp-t').value;
  if(!g||!d){ toast('Bitte Gegner und Datum angeben',true); return; }
  try{ sld(true); await dbASP(g,d,t); ren(); go('ov'); toast('✓ Spiel angelegt'); }
  catch(e){ toast('Fehler: '+e.message,true); }
  finally{ sld(false); }

// ── TERMINE-UPDATE (OpenLigaDB) ───────────────────────────────
const OLDB_LEAGUE='bl2', OLDB_SEASON='2026';
const isStP=t=>(((t&&t.teamName)||'').toLowerCase().includes('pauli'));
async function updTermine(){
  if(cm!=='live'||!sb){ toast('Bitte zuerst mit Supabase verbinden',true); return; }
  try{
    sld(true);
    const res=await fetch(`https://api.openligadb.de/getmatchdata/${OLDB_LEAGUE}/${OLDB_SEASON}`);
    if(!res.ok) throw new Error('OpenLigaDB HTTP '+res.status);
    const data=await res.json();
    if(!Array.isArray(data)||!data.length){ toast('Noch keine Termine bei OpenLigaDB hinterlegt',true); return; }
    const heute=new Date(); heute.setHours(0,0,0,0);
    const games=data.filter(m=>isStP(m.team1)||isStP(m.team2)).map(m=>{
      const heim=isStP(m.team1), opp=heim?m.team2:m.team1, dt=m.matchDateTime||'';
      return { ext:'oldb-'+m.matchID, gegner:(opp&&opp.teamName)||'Unbekannt',
               anstoss:dt||null, datum:dt?dt.slice(0,10):null,
               typ:heim?'heim':'auswaerts', st:(m.group&&m.group.groupOrderID)||null };
    }).filter(g=>g.datum && new Date(g.datum)>=heute);
    if(!games.length){ toast('Keine kommenden St.-Pauli-Termine gefunden',true); return; }
    const{data:cur,error}=await sb.from('spiele').select('id,gegner,datum,typ,ext_id,anstoss');
    if(error) throw error;
    const byExt={}; (cur||[]).forEach(r=>{ if(r.ext_id) byExt[r.ext_id]=r; });
    let nUpd=0; const toInsert=[];
    for(const g of games){
      const row={gegner:g.gegner,datum:g.datum,typ:g.typ,anstoss:g.anstoss,ext_id:g.ext};
      const ex=byExt[g.ext];
      if(ex){
        if(ex.datum!==g.datum||ex.anstoss!==g.anstoss||ex.gegner!==g.gegner||ex.typ!==g.typ){
          const{error:e2}=await sb.from('spiele').update(row).eq('id',ex.id); if(e2)throw e2; nUpd++;
        }
        continue;
      }
      const ph=g.st?(cur||[]).find(r=>!r.ext_id&&new RegExp('(^|\\D)'+g.st+'\\.\\s*Spieltag').test(r.gegner||'')):null;
      if(ph){ const{error:e3}=await sb.from('spiele').update(row).eq('id',ph.id); if(e3)throw e3; ph.ext_id=g.ext; nUpd++; }
      else toInsert.push(row);
    }
    let nNew=0;
    if(toInsert.length){ const{error:e4}=await sb.from('spiele').insert(toInsert); if(e4)throw e4; nNew=toInsert.length; }
    await ldall(); ren();
    toast(`✓ Termine: ${nNew} neu, ${nUpd} aktualisiert`);
  }catch(e){ console.warn('updTermine',e); toast('Update fehlgeschlagen: '+(e.message||e),true); }
  finally{ sld(false); }
}
